name: release

# Publishes anyagent to npm as a main launcher package plus one prebuilt
# per-platform package (esbuild-style optionalDependencies). Push a `vX.Y.Z` tag
# to release; requires an NPM_TOKEN repo secret with publish rights.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            pkg: darwin-arm64
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: linux-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage binary into platform package
        run: |
          mkdir -p "npm/${{ matrix.pkg }}/bin"
          install -m 755 "target/${{ matrix.target }}/release/anyagent" "npm/${{ matrix.pkg }}/bin/anyagent"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.pkg }}
          path: npm/${{ matrix.pkg }}/bin/anyagent
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Place binaries into platform packages
        run: |
          install -m 755 artifacts/binary-darwin-arm64/anyagent npm/darwin-arm64/bin/anyagent
          install -m 755 artifacts/binary-linux-x64/anyagent npm/linux-x64/bin/anyagent
      - name: Resolve version
        id: v
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi
      - name: Sync versions across all packages
        run: node scripts/sync-versions.mjs "${{ steps.v.outputs.version }}"
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --provenance --access public ./npm/darwin-arm64
          npm publish --provenance --access public ./npm/linux-x64
      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public .
